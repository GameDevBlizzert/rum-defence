name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  format:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      formatted: ${{ steps.check.outputs.formatted }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - run: dotnet restore RumDefence/RumDefence.csproj

      - run: dotnet format RumDefence/RumDefence.sln --no-restore

      - name: Commit formatting changes
        id: check
        if: ${{ github.actor != 'github-actions' }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          if [[ -n $(git status --porcelain) ]]; then
            git add .
            git commit -m "chore: auto-format code"
            git push
            echo "formatted=true" >> $GITHUB_OUTPUT
          else
            echo "formatted=false" >> $GITHUB_OUTPUT
          fi

  lint-and-build:
    needs: format
    runs-on: ubuntu-latest
    steps:
      - name: Skip if formatting was just applied
        if: ${{ needs.format.outputs.formatted == 'true' }}
        run: |
          echo "Formatting commit was just pushed. The next CI run will lint and build."
          exit 0

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - run: dotnet restore RumDefence/RumDefence.csproj

      - name: Lint
        run: dotnet build RumDefence/RumDefence.csproj --no-restore -warnaserror

      - name: Build project
        run: dotnet build RumDefence/RumDefence.csproj --configuration Release --no-restore

      - name: Install MonoGame tools
        run: dotnet tool install -g dotnet-mgcb

      - name: Build content
        run: mgcb /@:"RumDefence/Content/Content.mgcb"
